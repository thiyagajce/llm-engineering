<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Projects Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        margin-bottom: 30px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .dashboard {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        padding: 20px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      .card h2 {
        color: #333;
        margin-bottom: 15px;
        border-bottom: 3px solid #667eea;
        padding-bottom: 10px;
      }

      .input-group {
        margin-bottom: 15px;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-family: inherit;
        font-size: 14px;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      button {
        width: 100%;
        padding: 10px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: transform 0.2s ease;
      }

      button:hover {
        transform: scale(1.02);
      }

      button:active {
        transform: scale(0.98);
      }

      .response {
        background: #f5f5f5;
        border-left: 4px solid #667eea;
        padding: 12px;
        border-radius: 5px;
        margin-top: 15px;
        min-height: 60px;
        word-break: break-word;
        overflow-y: auto;
        max-height: 200px;
        font-size: 13px;
      }

      .response.empty {
        color: #999;
        font-style: italic;
      }

      .metadata {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #eee;
      }

      .status {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 3px;
        font-size: 12px;
        font-weight: bold;
        margin-right: 5px;
      }

      .status.ok {
        background: #d4edda;
        color: #155724;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
      }

      .loading {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #667eea;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
        margin-left: 5px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      .info {
        background: #e7f3ff;
        border-left: 4px solid #2196f3;
        padding: 10px;
        border-radius: 3px;
        margin-top: 10px;
        font-size: 12px;
        color: #0c5aa0;
      }

      @media (max-width: 1024px) {
        .dashboard {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 768px) {
        .dashboard {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 1.8em;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🤖 AI Projects Dashboard</h1>

      <div class="dashboard">
        <!-- Chatbot Card -->
        <div class="card">
          <h2>💬 Chatbot</h2>
          <div class="input-group">
            <textarea
              id="chatInput"
              placeholder="Type your message..."
            ></textarea>
          </div>
          <button onclick="sendChat()">Send Message</button>
          <div id="chatResponse" class="response empty">
            Waiting for response...
          </div>
          <div class="metadata" id="chatMetadata"></div>
          <div class="info">
            Press Enter to send, or click Send Message button
          </div>
        </div>

        <!-- RAG System Card -->
        <div class="card">
          <h2>🔍 RAG System</h2>
          <div class="input-group">
            <textarea id="ragInput" placeholder="Ask a question..."></textarea>
          </div>
          <button onclick="sendQuery()">Search & Generate</button>
          <div id="ragResponse" class="response empty">
            Waiting for response...
          </div>
          <div class="metadata" id="ragMetadata"></div>
          <div class="info">Enter your query and click Search & Generate</div>
        </div>

        <!-- Sentiment Analysis Card -->
        <div class="card">
          <h2>😊 Sentiment Analysis</h2>
          <div class="input-group">
            <textarea
              id="sentimentInput"
              placeholder="Enter text to analyze..."
            ></textarea>
          </div>
          <button onclick="analyzeSentiment()">Analyze</button>
          <div id="sentimentResponse" class="response empty">
            Waiting for analysis...
          </div>
          <div class="metadata" id="sentimentMetadata"></div>
          <div class="info">Note: Requires scikit-learn installation</div>
        </div>
      </div>
    </div>

    <script>
      const CHATBOT_URL = "http://localhost:5001";
      const RAG_URL = "http://localhost:5003";

      // Chatbot
      async function sendChat() {
        const input = document.getElementById("chatInput");
        const message = input.value.trim();

        if (!message) {
          alert("Please enter a message");
          return;
        }

        await sendRequest(
          `${CHATBOT_URL}/chat`,
          { message },
          "chatResponse",
          "chatMetadata",
        );

        input.value = "";
      }

      // RAG Query
      async function sendQuery() {
        const input = document.getElementById("ragInput");
        const query = input.value.trim();

        if (!query) {
          alert("Please enter a query");
          return;
        }

        const response = await sendRequest(
          `${RAG_URL}/query`,
          { query },
          "ragResponse",
          "ragMetadata",
        );

        if (response && response.retrieved_docs) {
          const docsInfo = `📚 Retrieved ${response.retrieved_docs.length} documents`;
          document.getElementById("ragMetadata").innerHTML +=
            `<div>${docsInfo}</div>`;
        }

        input.value = "";
      }

      // Sentiment Analysis (placeholder - requires backend)
      async function analyzeSentiment() {
        const input = document.getElementById("sentimentInput");
        const text = input.value.trim();

        if (!text) {
          alert("Please enter text to analyze");
          return;
        }

        // This would need a backend endpoint
        // For now, show a placeholder response
        document.getElementById("sentimentResponse").innerHTML =
          "⚠️ Sentiment analysis requires backend integration";
        document.getElementById("sentimentResponse").classList.remove("empty");

        input.value = "";
      }

      // Generic request sender
      async function sendRequest(url, data, responseId, metadataId) {
        const respElement = document.getElementById(responseId);
        const metaElement = document.getElementById(metadataId);

        respElement.innerHTML = 'Loading <span class="loading"></span>';
        respElement.classList.remove("empty");
        metaElement.innerHTML = "";

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const result = await response.json();

          // Display response
          const displayKey = Object.keys(result).find(
            (k) => k === "reply" || k === "answer",
          );
          const displayText = result[displayKey] || JSON.stringify(result);

          respElement.innerHTML = displayText;
          respElement.classList.remove("empty");

          // Display metadata
          const metadata = [];
          if (result.intent)
            metadata.push(
              `Intent: <span class="status ok">${result.intent}</span>`,
            );
          if (result.confidence)
            metadata.push(
              `Confidence: ${(result.confidence * 100).toFixed(0)}%`,
            );
          if (result.documents_retrieved)
            metadata.push(`Documents: ${result.documents_retrieved}`);
          if (result.history_length)
            metadata.push(`History: ${result.history_length} turns`);

          if (metadata.length > 0) {
            metaElement.innerHTML = metadata.join(" | ");
          }

          return result;
        } catch (error) {
          respElement.innerHTML = `<span class="status error">Error</span> ${error.message}`;
          respElement.classList.remove("empty");
          console.error("Request failed:", error);
          return null;
        }
      }

      // Allow Enter key in textareas
      document.getElementById("chatInput").addEventListener("keypress", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          sendChat();
        }
      });

      document.getElementById("ragInput").addEventListener("keypress", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          sendQuery();
        }
      });
    </script>
  </body>
</html>
